---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: devopsbackend-certificate
spec:
  secretName: devopsbackend-certificate
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - pk-backend.jcloud.jedlik.cloud
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devopsbackend-deployment
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: devopsbackend
  template:
    metadata:
      labels:
        app: devopsbackend
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: devopsbackend-api
          image: ghcr.io/kriszchan/devopsbackend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 20
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: devopsbackend-cluster-ip-service
spec:
  selector:
    app: devopsbackend
  type: ClusterIP
  ports:
    - protocol: TCP
      targetPort: 8080
      port: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devopsbackend-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod" # Add this line
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pk-backend.jcloud.jedlik.cloud
      secretName: devopsbackend-certificate
  rules:
    - host: pk-backend.jcloud.jedlik.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devopsbackend-cluster-ip-service
                port:
                  number: 80
